<!doctype html>
<html lang="en">
  <head>
    <script>
      // Early safeguard to prevent crashes from third-party scripts (like PayPal SDK, platform tools, or extensions)
      // that attempt to assign to window.fetch in environments where it only has a getter.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;

            const defineSafeFetch = (obj) => {
              Object.defineProperty(obj, 'fetch', {
                configurable: true,
                enumerable: true,
                get() {
                  return currentFetch;
                },
                set(val) {
                  currentFetch = val;
                }
              });
            };

            // Attempt to delete existing fetch properties first to remove any non-configurable or getter-only descriptors (if allowed)
            try {
              delete window.fetch;
            } catch (e) {}
            try {
              delete globalThis.fetch;
            } catch (e) {}
            try {
              if (typeof Window !== 'undefined' && Window.prototype) {
                delete Window.prototype.fetch;
              }
            } catch (e) {}

            // Define getter/setter on window
            try {
              defineSafeFetch(window);
            } catch (e) {
              // Fallback to simple writable data property if getter/setter definition fails
              try {
                Object.defineProperty(window, 'fetch', {
                  value: originalFetch,
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              } catch (err) {
                console.warn('Unable to redefine window.fetch on window:', err);
              }
            }

            // Define getter/setter on globalThis
            try {
              defineSafeFetch(globalThis);
            } catch (e) {}

            // Define getter/setter on Window.prototype
            if (typeof Window !== 'undefined' && Window.prototype) {
              try {
                defineSafeFetch(Window.prototype);
              } catch (e) {}
            }
          }
        } catch (e) {
          console.warn('Fetch safeguard failed entirely:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
